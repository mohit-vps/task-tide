<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Tide</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Daily Focus Board</p>
          <h1>Task Tide</h1>
          <p class="hero-copy">
            Capture what matters, cut the noise, and keep momentum visible.
          </p>
        </div>
        <div class="hero-stats">
          <div class="stat-card">
            <span id="task-count">0</span>
            <p>Open tasks</p>
          </div>
          <div class="stat-card">
            <span id="done-count">0</span>
            <p>Completed</p>
          </div>
        </div>
      </header>

      <main class="board">
        <section class="composer">
          <form id="task-form" class="task-form">
            <label class="sr-only" for="task-input">Add a task</label>
            <input
              id="task-input"
              name="task"
              type="text"
              maxlength="120"
              placeholder="What needs to get done?"
              autocomplete="off"
              required
            />
            <button type="submit">Add task</button>
          </form>

          <div class="toolbar">
            <div class="filters" role="tablist" aria-label="Task filters">
              <button class="filter is-active" data-filter="all" type="button">All</button>
              <button class="filter" data-filter="active" type="button">Active</button>
              <button class="filter" data-filter="done" type="button">Done</button>
            </div>
            <button id="clear-done" class="ghost-button" type="button">Clear completed</button>
          </div>
        </section>

        <section class="list-panel">
          <ul id="task-list" class="task-list" aria-live="polite"></ul>
          <template id="task-item-template">
            <li class="task-item">
              <label class="task-main">
                <input class="task-toggle" type="checkbox" />
                <span class="checkmark" aria-hidden="true"></span>
                <span class="task-text"></span>
              </label>
              <div class="task-actions">
                <button class="icon-button edit-button" type="button">Edit</button>
                <button class="icon-button delete-button" type="button">Delete</button>
              </div>
            </li>
          </template>
          <p id="empty-state" class="empty-state">
            No tasks yet. Add one and start moving.
          </p>
        </section>
      </main>
    </div>

    <script src="./script.js"></script>
  </body>
  </html>
